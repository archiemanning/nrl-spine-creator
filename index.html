<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRL Spine Draft</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

nav{
background:#181818;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.logo{
font-size:24px;
font-weight:bold;
}

.menu{
display:flex;
gap:20px;
}

.menu button{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:16px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#1b1b1b;
padding:25px;
border-radius:15px;
margin-bottom:20px;
}

.big-btn{
background:#22c55e;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.team{
font-size:30px;
margin-top:15px;
font-weight:bold;
}

.spine{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.slot{
background:#1b1b1b;
padding:20px;
border-radius:15px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
}

.modal-box{
background:#1b1b1b;
padding:25px;
border-radius:15px;
width:90%;
max-width:500px;
}

.player-btn{
width:100%;
margin-top:10px;
padding:15px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
cursor:pointer;
}

@media(max-width:700px){
.spine{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<nav>
<div class="logo">🏉 NRL Spine Draft</div>

<div class="menu">
<button>Home</button>
<button>Draft</button>
<button>Daily</button>
<button>VS</button>
</div>
</nav>

<div class="container">

<div class="card">
<h1>NRL Spine Draft 2026</h1>
<br>
<button class="big-btn" onclick="randomTeam()">
🎲 Random Team
</button>

<div class="team" id="team">
Press Random Team
</div>
</div>

<div class="spine">

<div class="slot">
<h3>Fullback</h3>
<p id="fb">Empty</p>
</div>

<div class="slot">
<h3>Five-Eighth</h3>
<p id="fe">Empty</p>
</div>

<div class="slot">
<h3>Halfback</h3>
<p id="hb">Empty</p>
</div>

<div class="slot">
<h3>Hooker</h3>
<p id="hk">Empty</p>
</div>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">

<h2 id="modalTitle">Choose Player</h2>

<button class="player-btn" onclick="selectPlayer('FB')">Fullback</button>
<button class="player-btn" onclick="selectPlayer('FE')">Five-Eighth</button>
<button class="player-btn" onclick="selectPlayer('HB')">Halfback</button>
<button class="player-btn" onclick="selectPlayer('HK')">Hooker</button>


</div>
</div>

<script>

const teams = [
"Broncos",
"Bulldogs",
"Raiders",
"Sharks",
"Dolphins",
"Titans",
"Sea Eagles",
"Storm",
"Knights",
"Cowboys",
"Eels",
"Panthers",
"Rabbitohs",
"Dragons",
"Roosters",
"Warriors",
"Wests Tigers"
];
const players = {

Broncos: [
 {name:"Reece Walsh", pos:"fb", rating:90},
 {name:"Ezra Mam", pos:"fe", rating:87},
 {name:"Adam Reynolds", pos:"hb", rating:87},
 {name:"Cory Paix", pos:"hk", rating:78}
],

Titans: [
 {name:"Keano Kini", pos:"fb", rating:88},
 {name:"Jayden Campbell", pos:"fe", rating:86},
 {name:"Zane Harrison", pos:"hb", rating:75},
 {name:"Oliver Pascoe", pos:"hk", rating:73}
],

Dolphins: [
 {name:"Hamiso Tabuai-Fidow", pos:"fb", rating:91},
 {name:"Kodi Nikorima", pos:"fe", rating:83},
 {name:"Isaiya Katoa", pos:"hb", rating:88},
 {name:"Max Plath", pos:"hk", rating:84}
],

Cowboys: [
 {name:"Scott Drinkwater", pos:"fb", rating:89},
 {name:"Jake Clifford", pos:"fe", rating:80},
 {name:"Tom Dearden", pos:"hb", rating:89},
 {name:"Reed Mahoney", pos:"hk", rating:86}
],

Warriors: [
 {name:"Taine Tuaupiki", pos:"fb", rating:82},
 {name:"Chanel Harris-Tavita", pos:"fe", rating:83},
 {name:"Tanah Boyd", pos:"hb", rating:80},
 {name:"Wayde Egan", pos:"hk", rating:87}
],

Raiders: [
 {name:"Kaeo Weekes", pos:"fb", rating:86},
 {name:"Ethan Strange", pos:"fe", rating:85},
 {name:"Ethan Sanders", pos:"hb", rating:78},
 {name:"Tom Starling", pos:"hk", rating:82}
],

Storm: [
 {name:"Sua Faalogo", pos:"fb", rating:88},
 {name:"Cameron Munster", pos:"fe", rating:91},
 {name:"Jahrome Hughes", pos:"hb", rating:92},
 {name:"Harry Grant", pos:"hk", rating:92}
]

};
function randomTeam(){

  const team =
  teams[Math.floor(Math.random()*teams.length)];

  document.getElementById("team").innerText = team;

  document.getElementById("modal").style.display = "flex";
}

function selectPlayer(position){

  if(position === "FB"){
    document.getElementById("fb").innerText = "Selected";
  }

  if(position === "FE"){
    document.getElementById("fe").innerText = "Selected";
  }

  if(position === "HB"){
    document.getElementById("hb").innerText = "Selected";
  }

  if(position === "HK"){
    document.getElementById("hk").innerText = "Selected";
  }

  document.getElementById("modal").style.display = "none";
}

</script>
</body>
</html>
