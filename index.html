<!DOCTYPE html>
<html>
<head>
  <title>NRL 2026 Spine Creator</title>
  <style>
    body{margin:0;font-family:Arial;background:#111;color:white}
    header{text-align:center;padding:25px;background:#000}
    .wrap{display:grid;grid-template-columns:1fr 1fr;gap:25px;padding:25px}
    .card{background:#1c1c1c;border-radius:18px;padding:20px;box-shadow:0 0 20px #000}
    button{background:#444;color:white;border:0;border-radius:12px;padding:12px 18px;cursor:pointer}
    button:hover{background:#666}
    .slot{background:#2b2b2b;margin:12px 0;padding:18px;border-radius:14px;cursor:pointer}
    .slot:hover{background:#3a3a3a}
    .player{background:#333;margin:8px 0;padding:10px;border-radius:10px}
    h2{color:#ddd}
  </style>
</head>
<body>

<header>
  <h1>NRL 2026 Spine Creator</h1>
  <p>Pick your 1-6-7-9 spine + random team generator</p>
</header>

<div class="wrap">
  <div class="card">
    <h2>Your Spine</h2>

    <div class="slot" onclick="showPlayers('fullback')">
      1. Fullback: <span id="pick1">Tap to choose</span>
    </div>

    <div class="slot" onclick="showPlayers('fiveEight')">
      6. Five-Eighth: <span id="pick6">Tap to choose</span>
    </div>

    <div class="slot" onclick="showPlayers('halfback')">
      7. Halfback: <span id="pick7">Tap to choose</span>
    </div>

    <div class="slot" onclick="showPlayers('hooker')">
      9. Hooker: <span id="pick9">Tap to choose</span>
    </div>

    <h3>Players</h3>
    <div id="players"></div>
  </div>

  <div class="card">
    <h2>Random NRL Team</h2>
    <button onclick="randomTeam()">Random Team</button>
    <h3 id="teamName">Press random</h3>
    <div id="teamList"></div>
  </div>
</div>

<script>
const teams = [
"Penrith Panthers","South Sydney Rabbitohs","Cronulla Sharks","Manly Sea Eagles",
"Newcastle Knights","Sydney Roosters","St George Illawarra Dragons",
"Canterbury-Bankstown Bulldogs","Wests Tigers","Parramatta Eels","Dolphins",
"Brisbane Broncos","Gold Coast Titans","North Queensland Cowboys",
"New Zealand Warriors","Canberra Raiders","Melbourne Storm"
];

const players = {
  fullback:["Dylan Edwards","Reece Walsh","Scott Drinkwater","William Kennedy","Clinton Gutherson","Keano Kini","Jye Gray","Taine Tuaupiki","Sualauvi Faalogo"],
  fiveEight:["Blaize Talagi","Ezra Mam","Cody Walker","Cameron Munster","Braydon Trindall","Matt Burton","Luke Metcalf","Lachlan Ilias"],
  halfback:["Nathan Cleary","Adam Reynolds","Nicholas Hynes","Jahrome Hughes","Tom Dearden","Daniel Atkinson","Jamie Humphreys","Tanah Boyd"],
  hooker:["Harry Grant","Ben Hunt","Blayke Brailey","Damien Cook","Reed Mahoney","Wayde Egan","Freddy Lussick","Bailey Hayward"]
};

const randomNames = [
"Fullback","Winger","Winger","Centre","Centre","Five-Eighth","Halfback",
"Prop","Hooker","Prop","Second Row","Second Row","Lock",
"Interchange","Interchange","Interchange","Interchange"
];

function showPlayers(pos){
  const box = document.getElementById("players");
  box.innerHTML = "";
  players[pos].forEach(name=>{
    const div = document.createElement("div");
    div.className = "player";
    div.innerText = name;
    div.onclick = () => pickPlayer(pos,name);
    box.appendChild(div);
  });
}

function pickPlayer(pos,name){
  if(pos==="fullback") document.getElementById("pick1").innerText = name;
  if(pos==="fiveEight") document.getElementById("pick6").innerText = name;
  if(pos==="halfback") document.getElementById("pick7").innerText = name;
  if(pos==="hooker") document.getElementById("pick9").innerText = name;
}

function randomTeam(){
  const team = teams[Math.floor(Math.random()*teams.length)];
  document.getElementById("teamName").innerText = team;

  let html = "";
  for(let i=1;i<=17;i++){
    html += `<div class="player">${i}. ${randomNames[i-1]}</div>`;
  }
  document.getElementById("teamList").innerHTML = html;
}
</script>

</body>
</html>
