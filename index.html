<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRL Spine Creator 2026</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
}

header{
  background:#000;
  padding:20px;
  text-align:center;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e1e1e;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

button{
  background:#333;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#555;
}

.spine-slot{
  background:#2a2a2a;
  padding:15px;
  margin:10px 0;
  border-radius:8px;
}

.team-box{
  font-size:24px;
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <h1>🏉 NRL Spine Creator 2026</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Your Spine</h2>

    <div class="spine-slot">1 - Fullback</div>
    <div class="spine-slot">6 - Five-Eighth</div>
    <div class="spine-slot">7 - Halfback</div>
    <div class="spine-slot">9 - Hooker</div>
  </div>

  <div class="card">
    <h2>Random Team</h2>

    <button id="randomBtn">
      Random Team
    </button>

    <div class="team-box" id="team">
      Press Random Team
    </div>
  </div>

</div>

<script>

const teams = [
"Penrith Panthers",
"South Sydney Rabbitohs",
"Cronulla Sharks",
"Manly Sea Eagles",
"Newcastle Knights",
"Sydney Roosters",
"St George Illawarra Dragons",
"Canterbury Bulldogs",
"Wests Tigers",
"Parramatta Eels",
"Dolphins",
"Brisbane Broncos",
"Gold Coast Titans",
"North Queensland Cowboys",
"New Zealand Warriors",
"Canberra Raiders",
"Melbourne Storm"
];

function randomTeam(){
  const team = teams[Math.floor(Math.random()*teams.length)];
  document.getElementById("team").innerText = team;
}

</script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
